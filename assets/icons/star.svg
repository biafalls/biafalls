<?xml version="1.0" encoding="UTF-8"?>
<svg
    xmlns="http://www.w3.org/2000/svg"
    width="64"
    height="64"
    viewBox="0 0 64 64">

    <title>Biafalls Star</title>

    <defs>

        <filter id="glow">

            <feGaussianBlur
                stdDeviation="2"
                result="blur"/>

            <feMerge>

                <feMergeNode in="blur"/>

                <feMergeNode in="SourceGraphic"/>

            </feMerge>

        </filter>

    </defs>

    <!-- glow -->

    <circle
        cx="32"
        cy="32"
        r="15"
        fill="#7AE7FF"
        opacity=".18"
        filter="url(#glow)">

        <animate
            attributeName="opacity"
            values=".12;.35;.12"
            dur="2.6s"
            repeatCount="indefinite"/>

    </circle>

    <!-- star -->

    <path

        d="M32 15
           L36 27
           L49 32
           L36 37
           L32 49
           L28 37
           L15 32
           L28 27
           Z"

        fill="#FFD166"
        stroke="#111827"
        stroke-width="2.2"
        stroke-linejoin="round"
        filter="url(#glow)">

        <animateTransform
            attributeName="transform"
            type="scale"
            values="1;1.06;1"
            additive="sum"
            dur="2.4s"
            repeatCount="indefinite"/>

    </path>

</svg>