<?xml version="1.0" encoding="UTF-8"?>
<svg
    xmlns="http://www.w3.org/2000/svg"
    width="64"
    height="64"
    viewBox="0 0 64 64">

    <title>Biafalls Moon</title>

    <defs>

        <filter id="glow">
            <feGaussianBlur stdDeviation="2.2" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>

    </defs>

    <!-- glow -->

    <circle
        cx="32"
        cy="32"
        r="18"
        fill="#7AE7FF"
        opacity=".18"
        filter="url(#glow)">

        <animate
            attributeName="opacity"
            values=".10;.28;.10"
            dur="4s"
            repeatCount="indefinite"/>

    </circle>

    <!-- moon -->

    <path
        d="M39 13
           C28 15 21 25 23 36
           C25 47 36 53 46 49
           C40 48 34 44 31 37
           C28 29 30 20 39 13Z"

        fill="#FFD166"
        stroke="#111827"
        stroke-width="2.2"
        stroke-linejoin="round">

        <animateTransform
            attributeName="transform"
            type="translate"
            values="0 0;0 -1;0 0"
            dur="5s"
            repeatCount="indefinite"/>

    </path>

</svg>