<?xml version="1.0" encoding="UTF-8"?>
<svg
    xmlns="http://www.w3.org/2000/svg"
    width="64"
    height="64"
    viewBox="0 0 64 64">

    <title>Biafalls Backpack</title>

    <defs>

        <filter id="glow">
            <feGaussianBlur stdDeviation="2.2" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>

    </defs>

    <!-- Glow -->

    <ellipse
        cx="32"
        cy="34"
        rx="18"
        ry="20"
        fill="#7AE7FF"
        opacity=".12"
        filter="url(#glow)">

        <animate
            attributeName="opacity"
            values=".08;.22;.08"
            dur="4s"
            repeatCount="indefinite"/>

    </ellipse>

    <!-- Backpack -->

    <rect

        x="18"
        y="18"

        width="28"

        height="30"

        rx="8"

        fill="#7C5CFF"

        stroke="#111827"

        stroke-width="2.2">

        <animateTransform

            attributeName="transform"

            type="translate"

            values="0 0;0 -1;0 0"

            dur="5s"

            repeatCount="indefinite"/>

    </rect>

    <!-- Flap -->

    <path

        d="M22 22
           H42
           V30
           H22
           Z"

        fill="#FFD166"

        stroke="#111827"

        stroke-width="2.2"/>

    <!-- Pocket -->

    <rect

        x="24"

        y="33"

        width="16"

        height="10"

        rx="3"

        fill="#0B1020"

        stroke="#111827"

        stroke-width="2"/>

    <!-- Buckle -->

    <rect

        x="29"

        y="26"

        width="6"

        height="8"

        rx="1"

        fill="#F8FAFC"

        stroke="#111827"

        stroke-width="1.6"/>

    <!-- Left Strap -->

    <path

        d="M21 23
           C16 28 16 39 20 45"

        fill="none"

        stroke="#111827"

        stroke-width="2.2"

        stroke-linecap="round"/>

    <!-- Right Strap -->

    <path

        d="M43 23
           C48 28 48 39 44 45"

        fill="none"

        stroke="#111827"

        stroke-width="2.2"

        stroke-linecap="round"/>

</svg>